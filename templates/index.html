<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUD Macro Sentiment Gauge</title>
    <style>
        html, body {
            background-color: #191919 !important;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background-color: #191919 !important;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
            width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gauge-header {
            background-color: #2f343b;
            color: white;
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            padding: 14px 0;
            border-radius: 6px 6px 0 0;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            transition: background-color 0.3s ease;
        }

        .canvas-container {
            position: relative;
            width: 300px;
            height: 170px;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        #statusText {
            font-size: 26px;
            font-weight: bold;
            color: #ffffff;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* Interactive Hover Tooltip */
        #tooltip {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 5px 10px;
            font-size: 11px;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="gauge-header" id="headerTitle">Loading...</div>
        
        <div class="canvas-container">
            <canvas id="gaugeCanvas" width="300" height="170"></canvas>
            <div id="tooltip">Hover over dial zones</div>
        </div>

        <div id="statusText">--</div>
    </div>

    <script>
        let currentScore = 0;
        let globalAngle = Math.PI; 
        let animationFrameId = null;

        function renderGauge(score, needleAngleTarget) {
            const canvas = document.getElementById('gaugeCanvas');
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cx = 150;
            const cy = 150;
            const radius = 115;
            const thickness = 20;

            // Background Outer Ring Rim
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 10, Math.PI, 2 * Math.PI);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#dcdcdc';
            ctx.stroke();

            // Inner White Dial Background
            ctx.beginPath();
            ctx.arc(cx, cy, radius - thickness / 2, Math.PI, 2 * Math.PI, false);
            ctx.fillStyle = '#ffffff';
            ctx.fill();

            // 1. Draw Red Zone
            ctx.beginPath();
            ctx.arc(cx, cy, radius, Math.PI, Math.PI + 1.22);
            ctx.lineWidth = thickness;
            ctx.strokeStyle = '#e05353';
            ctx.stroke();

            // 2. Draw Blue Zone
            ctx.beginPath();
            ctx.arc(cx, cy, radius, Math.PI + 1.92, 2 * Math.PI);
            ctx.lineWidth = thickness;
            ctx.strokeStyle = '#2f65d8';
            ctx.stroke();

            // 3. Draw Tick Marks
            const totalTicks = 20;
            for (let i = 0; i <= totalTicks; i++) {
                const angle = Math.PI + (i / totalTicks) * Math.PI;
                const innerR = radius - thickness - 4;
                const outerR = radius - thickness + 2;
                
                const x1 = cx + innerR * Math.cos(angle);
                const y1 = cy + innerR * Math.sin(angle);
                const x2 = cx + outerR * Math.cos(angle);
                const y2 = cy + outerR * Math.sin(angle);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineWidth = (i === 0 || i === 5 || i === 10 || i === 15 || i === 20) ? 2.5 : 1;
                ctx.strokeStyle = '#555555';
                ctx.stroke();
            }

            // 4. Draw Text Labels
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const labels = [
                { text: '+ Bear', angle: Math.PI + 0.32 },
                { text: 'Bear',   angle: Math.PI + 0.82 },
                { text: 'Neutral', angle: Math.PI + 1.57 },
                { text: 'Bull',   angle: Math.PI + 2.32 },
                { text: '+ Bull', angle: Math.PI + 2.82 }
            ];

            labels.forEach(l => {
                const labelRadius = radius - 38;
                const lx = cx + labelRadius * Math.cos(l.angle);
                const ly = cy + labelRadius * Math.sin(l.angle);
                ctx.fillText(l.text, lx, ly);
            });

            // 5. Draw Analog Needle Pointer
            const needleLength = radius - 15;
            const nx = cx + needleLength * Math.cos(needleAngleTarget);
            const ny = cy + needleLength * Math.sin(needleAngleTarget);

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(nx, ny);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#e06c3e';
            ctx.lineCap = 'round';
            ctx.stroke();

            // 6. Draw Central Pivot Blue Cap
            ctx.beginPath();
            ctx.arc(cx, cy, 14, 0, 2 * Math.PI);
            ctx.fillStyle = '#2f65d8';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
        }

        // --- Interactivity: Mouse Hover Tooltips ---
        const canvas = document.getElementById('gaugeCanvas');
        const tooltip = document.getElementById('tooltip');

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const dx = x - 150;
            const dy = y - 150;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance >= 75 && distance <= 135 && y <= 150) {
                let angle = Math.atan2(dy, dx);
                if (angle < 0) angle += 2 * Math.PI;

                tooltip.style.opacity = '1';
                
                if (angle >= Math.PI && angle < Math.PI + 1.22) {
                    tooltip.innerText = "Very Bearish AUD (Score < -0.3)";
                } else if (angle >= Math.PI + 1.22 && angle < Math.PI + 1.48) {
                    tooltip.innerText = "Bearish AUD (Score < -0.06)";
                } else if (angle >= Math.PI + 1.48 && angle < Math.PI + 1.66) {
                    tooltip.innerText = "Neutral AUD";
                } else if (angle >= Math.PI + 1.66 && angle < Math.PI + 1.92) {
                    tooltip.innerText = "Bullish AUD (Score > 0.06)";
                } else {
                    tooltip.innerText = "Very Bullish AUD (Score > 0.3)";
                }
            } else {
                tooltip.style.opacity = '0';
            }
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
        });

        async function loadLiveGauge() {
            try {
                const response = await fetch('/api/score');
                const data = await response.json();
                
                const score = (data.score !== undefined) ? data.score : 0; 
                currentScore = score;

                const minVal = -0.5;
                const maxVal = 0.5;
                let clampedScore = Math.max(minVal, Math.min(maxVal, score));
                let normalized = (clampedScore - minVal) / (maxVal - minVal);
                const targetAngle = Math.PI + (normalized * Math.PI);

                if (animationFrameId) cancelAnimationFrame(animationFrameId);

                globalAngle = Math.PI;

                function animate() {
                    globalAngle += (targetAngle - globalAngle) * 0.15;
                    renderGauge(score, globalAngle);
                    if (Math.abs(targetAngle - globalAngle) > 0.001) {
                        animationFrameId = requestAnimationFrame(animate);
                    }
                }
                animate();

                const headerEl = document.getElementById('headerTitle');
                const statusEl = document.getElementById('statusText');
                
                statusEl.innerText = score.toFixed(4);

                if (score > 0.3) {
                    headerEl.innerText = "Very Bullish AUD";
                    headerEl.style.backgroundColor = "#2f65d8";
                } else if (score > 0.06) {
                    headerEl.innerText = "Bullish AUD";
                    headerEl.style.backgroundColor = "#2f65d8";
                } else if (score < -0.3) {
                    headerEl.innerText = "Very Bearish AUD";
                    headerEl.style.backgroundColor = "#e05353";
                } else if (score < -0.06) {
                    headerEl.innerText = "Bearish AUD";
                    headerEl.style.backgroundColor = "#e05353";
                } else {
                    headerEl.innerText = "Neutral AUD";
                    headerEl.style.backgroundColor = "#555555";
                }

            } catch (error) {
                console.error('Error fetching score:', error);
                document.getElementById('statusText').innerText = 'Error';
            }
        }

        loadLiveGauge();
        setInterval(loadLiveGauge, 2000);
    </script>
</body>
</html>
